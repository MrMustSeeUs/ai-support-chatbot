# =============================================================================
# File:    wrangler.toml
# Purpose: Cloudflare Workers deployment configuration.
#          Tells Wrangler the project name, entry point, and runtime settings.
#          Secrets (ANTHROPIC_API_KEY) are set via the Cloudflare dashboard
#          or `wrangler secret put` — never stored in this file.
# Author:  Abraham Macias
# Date:    2026-06-25
# =============================================================================

name               = "ai-support-chatbot"
main               = "worker.js"
compatibility_date = "2024-01-01"

# ---------------------------------------------------------------------------
# Non-secret environment variables. Set ANTHROPIC_API_KEY separately via:
#   wrangler secret put ANTHROPIC_API_KEY
# or Cloudflare dashboard → Workers → Settings → Variables & Secrets
# ---------------------------------------------------------------------------
[vars]
BUSINESS_NAME = "Teocalli Devs"

[env.production]
name = "ai-support-chatbot-prod"
